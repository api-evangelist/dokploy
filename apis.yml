aid: dokploy
name: Dokploy
description: Dokploy is an open-source, self-hostable Platform-as-a-Service (PaaS) — an alternative to Heroku, Vercel, and
  Netlify — that deploys applications, Docker Compose stacks, and managed databases across one or many servers using Docker
  and Docker Swarm, with Traefik handling routing and TLS.
type: Index
