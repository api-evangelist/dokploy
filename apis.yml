apis:
- aid: dokploy:dokploy
  name: Dokploy
  description: The Dokploy HTTP API exposes every operation the Dokploy UI can perform — projects, applications, Docker Compose
    services, managed databases (Postgres, MySQL, MariaDB, MongoDB, Redis, LibSQL), domains, certificates, registries, Git
    providers (GitHub, GitLab, Gitea, Bitbucket), servers, Docker Swarm clusters, backups, schedules, notifications, audit
    logs, SSO, custom roles, white-labeling, and Stripe billing — across 526 endpoints generated from the project's canonical
    OpenAPI 3.1 specification.
  humanURL: https://dokploy.com/
  baseURL: https://your-dokploy-instance.com/api
