naftiko: 1.0.0-alpha2
info:
  label: Dokploy API — rollback
  description: 'Dokploy API — rollback. 2 operations. Lead operation: rollback.delete. Self-contained Naftiko capability covering one Dokploy
    business surface.'
  tags:
  - Dokploy
  - rollback
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    DOKPLOY_API_KEY: DOKPLOY_API_KEY
    DOKPLOY_URL: DOKPLOY_URL
capability:
  consumes:
  - type: http
    namespace: dokploy-rollback
    baseUri: ${DOKPLOY_URL}/api
    description: Dokploy API — rollback business capability. Self-contained, no shared references.
    resources:
    - name: delete
      path: /rollback.delete
      operations:
      - name: rollback-delete
        method: POST
        description: rollback-delete
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body
          required: true
    - name: rollback
      path: /rollback.rollback
      operations:
      - name: rollback-rollback
        method: POST
        description: rollback-rollback
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body
          required: true
  exposes:
  - type: rest
    namespace: dokploy-rollback-rest
    port: 8080
    description: REST adapter for Dokploy API — rollback. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/rollback.delete
      name: delete
      description: REST surface for delete.
      operations:
      - method: POST
        name: rollback-delete
        description: rollback-delete
        call: dokploy-rollback.rollback-delete
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rollback.rollback
      name: rollback
      description: REST surface for rollback.
      operations:
      - method: POST
        name: rollback-rollback
        description: rollback-rollback
        call: dokploy-rollback.rollback-rollback
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dokploy-rollback-mcp
    port: 9090
    transport: http
    description: MCP adapter for Dokploy API — rollback. One tool per consumed operation, routed inline through this capability’s consumes block.
    tools:
    - name: rollback-delete
      description: rollback-delete
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dokploy-rollback.rollback-delete
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: rollback-rollback
      description: rollback-rollback
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dokploy-rollback.rollback-rollback
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
