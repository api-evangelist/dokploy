    post:
      operationId: user-update
      tags:
      - user
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  minLength: 1
                firstName:
                  type: string
                lastName:
                  type: string
                isRegistered:
                  type: boolean
                expirationDate:
                  type: string
                createdAt2:
                  type: string
                createdAt:
                  anyOf:
                  - type: string
                  - type: 'null'
                twoFactorEnabled:
                  anyOf:
                  - type: boolean
                  - type: 'null'
                email:
                  type: string
                  minLength: 1
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
