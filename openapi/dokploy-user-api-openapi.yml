                  type: boolean
                image:
                  anyOf:
                  - type: string
                  - type: 'null'
                banned:
                  anyOf:
                  - type: boolean
                  - type: 'null'
                banReason:
                  anyOf:
                  - type: string
                  - type: 'null'
                banExpires:
                  anyOf:
                  - type: string
                  - type: 'null'
                updatedAt:
                  type: string
                enablePaidFeatures:
                  type: boolean
                allowImpersonation:
                  type: boolean
                enableEnterpriseFeatures:
                  type: boolean
                licenseKey:
                  anyOf:
                  - type: string
                  - type: 'null'
                stripeCustomerId:
                  anyOf:
                  - type: string
                  - type: 'null'
                stripeSubscriptionId:
                  anyOf:
                  - type: string
                  - type: 'null'
                serversQuantity:
                  type: number
                sendInvoiceNotifications:
                  type: boolean
                password:
                  type: string
                currentPassword:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
