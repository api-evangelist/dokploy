                  type: string
                  minLength: 1
                name:
                  type: string
                  minLength: 1
                apiUrl:
                  type: string
                  format: uri
                apiKey:
                  type: string
                model:
                  type: string
                  minLength: 1
                isEnabled:
                  type: boolean
                createdAt:
                  type: string
              required:
              - aiId
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
