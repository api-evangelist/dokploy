      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                apiUrl:
                  type: string
                  minLength: 1
                apiKey:
                  type: string
                model:
                  type: string
                  minLength: 1
              required:
