  /ai.analyzeLogs:
    post:
      operationId: ai-analyzeLogs
      tags:
      - ai
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                aiId:
                  type: string
                  minLength: 1
                logs:
                  type: string
                  minLength: 1
                context:
                  type: string
                  enum:
                  - build
                  - runtime
              required:
              - aiId
              - logs
              - context
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
