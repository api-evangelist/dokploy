  /ai.suggest:
    post:
      operationId: ai-suggest
      tags:
      - ai
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                aiId:
                  type: string
                input:
                  type: string
                serverId:
                  type: string
              required:
              - aiId
              - input
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
