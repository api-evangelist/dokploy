  /ai.create:
    post:
      operationId: ai-create
      tags:
      - ai
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                apiUrl:
                  type: string
                  format: uri
                apiKey:
                  type: string
                model:
                  type: string
                  minLength: 1
                isEnabled:
                  type: boolean
              required:
              - name
              - apiUrl
              - apiKey
              - model
              - isEnabled
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
