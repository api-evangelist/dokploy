  /mongo.update:
    post:
      operationId: mongo-update
      tags:
      - mongo
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mongoId:
                  type: string
                  minLength: 1
                name:
                  type: string
                  minLength: 1
                appName:
                  type: string
                  minLength: 1
                  maxLength: 63
                  pattern: ^[a-zA-Z0-9._-]+$
                description:
                  anyOf:
                  - type: string
                  - type: 'null'
                databaseUser:
                  type: string
                  minLength: 1
                databasePassword:
                  type: string
                  pattern: ^[a-zA-Z0-9@#%^&*()_+\-=[\]{}|;:,.<>?~`]*$
                dockerImage:
                  type: string
                command:
                  anyOf:
                  - type: string
                  - type: 'null'
                args:
                  anyOf:
                  - type: array
                    items:
                      type: string
                  - type: 'null'
                env:
                  anyOf:
                  - type: string
                  - type: 'null'
                memoryReservation:
                  anyOf:
                  - type: string
                  - type: 'null'
                memoryLimit:
                  anyOf:
                  - type: string
                  - type: 'null'
                cpuReservation:
                  anyOf:
                  - type: string
                  - type: 'null'
                cpuLimit:
                  anyOf:
                  - type: string
                  - type: 'null'
                externalPort:
                  anyOf:
                  - type: number
                  - type: 'null'
                applicationStatus:
                  type: string
                  enum:
                  - idle
                  - running
                  - done
                  - error
                healthCheckSwarm:
                  anyOf:
                  - anyOf:
                    - type: object
                      properties:
                        Test:
                          type: array
                          items:
                            type: string
                        Interval:
                          type: number
                        Timeout:
                          type: number
                        StartPeriod:
                          type: number
                        Retries:
                          type: number
                      additionalProperties: false
                    - type: 'null'
                  - type: 'null'
                restartPolicySwarm:
                  anyOf:
                  - anyOf:
                    - type: object
                      properties:
                        Condition:
                          type: string
                        Delay:
                          type: number
                        MaxAttempts:
                          type: number
                        Window:
                          type: number
                      additionalProperties: false
                    - type: 'null'
                  - type: 'null'
                placementSwarm:
                  anyOf:
                  - anyOf:
                    - type: object
                      properties:
                        Constraints:
                          type: array
                          items:
                            type: string
                        Preferences:
                          type: array
                          items:
                            type: object
                            properties:
                              Spread:
                                type: object
                                properties:
                                  SpreadDescriptor:
                                    type: string
                                required:
                                - SpreadDescriptor
                            required:
                            - Spread
                            additionalProperties: false
                        MaxReplicas:
                          type: number
                        Platforms:
                          type: array
                          items:
                            type: object
                            properties:
                              Architecture:
                                type: string
                              OS:
                                type: string
                            required:
                            - Architecture
                            - OS
                            additionalProperties: false
                      additionalProperties: false
                    - type: 'null'
                  - type: 'null'
                updateConfigSwarm:
                  anyOf:
                  - anyOf:
                    - type: object
                      properties:
                        Parallelism:
                          type: number
                        Delay:
                          type: number
                        FailureAction:
                          type: string
                        Monitor:
                          type: number
                        MaxFailureRatio:
                          type: number
                        Order:
                          type: string
                      required:
                      - Parallelism
                      - Order
                      additionalProperties: false
                    - type: 'null'
                  - type: 'null'
                rollbackConfigSwarm:
                  anyOf:
                  - anyOf:
                    - type: object
                      properties:
                        Parallelism:
                          type: number
                        Delay:
                          type: number
                        FailureAction:
                          type: string
                        Monitor:
                          type: number
                        MaxFailureRatio:
                          type: number
                        Order:
                          type: string
                      required:
                      - Parallelism
                      - Order
                      additionalProperties: false
                    - type: 'null'
                  - type: 'null'
                modeSwarm:
                  anyOf:
                  - anyOf:
                    - type: object
                      properties:
                        Replicated:
                          type: object
                          properties:
                            Replicas:
                              type: number
                          additionalProperties: false
                        Global:
                          type: object
                          properties: {}
                        ReplicatedJob:
                          type: object
                          properties:
                            MaxConcurrent:
                              type: number
                            TotalCompletions:
                              type: number
                          additionalProperties: false
                        GlobalJob:
                          type: object
                          properties: {}
                      additionalProperties: false
                    - type: 'null'
                  - type: 'null'
                labelsSwarm:
                  anyOf:
                  - anyOf:
                    - type: object
                      propertyNames:
                        type: string
                      additionalProperties:
                        type: string
                    - type: 'null'
                  - type: 'null'
                networkSwarm:
                  anyOf:
                  - anyOf:
                    - type: array
                      items:
                        type: object
                        properties:
                          Target:
                            type: string
                          Aliases:
                            type: array
                            items:
                              type: string
                          DriverOpts:
                            type: object
                            propertyNames:
                              type: string
                            additionalProperties:
                              type: string
                        additionalProperties: false
                    - type: 'null'
                  - type: 'null'
                stopGracePeriodSwarm:
                  anyOf:
                  - anyOf:
                    - type: number
                    - type: 'null'
                  - type: 'null'
                endpointSpecSwarm:
                  anyOf:
                  - anyOf:
                    - type: object
                      properties:
                        Mode:
                          type: string
                        Ports:
                          type: array
                          items:
                            type: object
                            properties:
                              Protocol:
                                type: string
                              TargetPort:
                                type: number
                              PublishedPort:
                                type: number
                              PublishMode:
                                type: string
                            additionalProperties: false
                      additionalProperties: false
                    - type: 'null'
                  - type: 'null'
                ulimitsSwarm:
                  anyOf:
                  - anyOf:
                    - type: array
                      items:
                        type: object
                        properties:
                          Name:
                            type: string
                            minLength: 1
                          Soft:
                            type: integer
                            minimum: -1
                            maximum: 9007199254740991
                          Hard:
                            type: integer
                            minimum: -1
                            maximum: 9007199254740991
                        required:
                        - Name
                        - Soft
                        - Hard
                        additionalProperties: false
                    - type: 'null'
                  - type: 'null'
                replicas:
                  type: number
                createdAt:
                  type: string
                environmentId:
                  type: string
                replicaSets:
                  anyOf:
                  - default: false
                    type: boolean
                  - type: 'null'
              required:
              - mongoId
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.UNAUTHORIZED'
        '403':
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.FORBIDDEN'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.INTERNAL_SERVER_ERROR'
