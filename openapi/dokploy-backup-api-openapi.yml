openapi: 3.1.0
info:
  title: Dokploy admin backup API
  description: Complete API documentation for Dokploy - Deploy applications, manage databases, and orchestrate your infrastructure. This API allows you to programmatically manage all aspects of your Dokploy instance.
  version: 1.0.0
  contact:
    name: Dokploy Team
    url: https://dokploy.com
  license:
    name: Apache 2.0
    url: https://github.com/dokploy/dokploy/blob/canary/LICENSE
servers:
- url: https://your-dokploy-instance.com/api
security:
- apiKey: []
tags:
- name: backup
paths:
  /backup.create:
    post:
      operationId: backup-create
      tags:
      - backup
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                schedule:
                  type: string
                enabled:
                  anyOf:
                  - type: boolean
                  - type: 'null'
                prefix:
                  type: string
                  minLength: 1
                destinationId:
                  type: string
                keepLatestCount:
                  anyOf:
                  - type: number
                  - type: 'null'
                database:
                  type: string
                  minLength: 1
                mariadbId:
                  anyOf:
                  - type: string
                  - type: 'null'
                mysqlId:
                  anyOf:
                  - type: string
                  - type: 'null'
                postgresId:
                  anyOf:
                  - type: string
                  - type: 'null'
                mongoId:
                  anyOf:
                  - type: string
                  - type: 'null'
                libsqlId:
                  anyOf:
                  - type: string
                  - type: 'null'
                databaseType:
                  type: string
                  enum:
                  - postgres
                  - mariadb
                  - mysql
                  - mongo
                  - web-server
                  - libsql
                userId:
                  anyOf:
                  - type: string
                  - type: 'null'
                backupType:
                  type: string
                  enum:
                  - database
                  - compose
                composeId:
                  anyOf:
                  - type: string
                  - type: 'null'
                serviceName:
                  anyOf:
                  - type: string
                  - type: 'null'
                metadata:
                  anyOf:
                  - {}
                  - type: 'null'
              required:
              - schedule
              - prefix
              - destinationId
              - database
              - databaseType
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.UNAUTHORIZED'
        '403':
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.FORBIDDEN'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.INTERNAL_SERVER_ERROR'
