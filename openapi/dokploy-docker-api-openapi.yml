  /docker.uploadFileToContainer:
    post:
      operationId: docker-uploadFileToContainer
      tags:
      - docker
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                containerId:
                  type: string
                  minLength: 1
                  pattern: ^[a-zA-Z0-9.\-_]+$
                file:
                  type: string
                  format: binary
                destinationPath:
                  type: string
                  minLength: 1
                  pattern: ^[a-zA-Z0-9.\-_/]+$
                serverId:
                  type: string
              required:
              - containerId
              - file
              - destinationPath
      responses:
