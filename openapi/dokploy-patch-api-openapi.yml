      - in: query
        name: type
        schema:
          type: string
          enum:
          - application
          - compose
        required: true
      - in: query
        name: repoPath
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
