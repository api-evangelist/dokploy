      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                patchId:
                  type: string
                  minLength: 1
                type:
                  type: string
                  enum:
                  - create
                  - update
                  - delete
                filePath:
                  type: string
                  minLength: 1
                enabled:
                  type: boolean
                content:
                  type: string
                createdAt:
                  type: string
                updatedAt:
                  anyOf:
                  - type: string
                  - type: 'null'
              required:
              - patchId
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
