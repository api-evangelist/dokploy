                  minLength: 1
                type:
                  type: string
                  enum:
                  - application
                  - compose
                filePath:
                  type: string
                content:
                  type: string
                patchType:
                  default: update
                  type: string
                  enum:
                  - create
                  - update
              required:
              - id
              - type
              - filePath
              - content
      responses:
