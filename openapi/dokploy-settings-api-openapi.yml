  /settings.assignDomainServer:
    post:
      operationId: settings-assignDomainServer
      tags:
      - settings
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                host:
                  type: string
                certificateType:
                  type: string
                  enum:
                  - letsencrypt
                  - none
                  - custom
                letsEncryptEmail:
                  anyOf:
                  - anyOf:
                    - type: string
                      format: email
                      pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                    - type: string
                      const: ''
                  - type: 'null'
                https:
                  type: boolean
              required:
              - host
              - certificateType
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
