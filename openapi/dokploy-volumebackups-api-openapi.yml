openapi: 3.1.0
info:
  title: Dokploy admin volumeBackups API
  description: Complete API documentation for Dokploy - Deploy applications, manage databases, and orchestrate your infrastructure. This API allows you to programmatically manage all aspects of your Dokploy instance.
  version: 1.0.0
  contact:
    name: Dokploy Team
    url: https://dokploy.com
  license:
    name: Apache 2.0
    url: https://github.com/dokploy/dokploy/blob/canary/LICENSE
servers:
- url: https://your-dokploy-instance.com/api
security:
- apiKey: []
tags:
- name: volumeBackups
paths:
  /volumeBackups.list:
    get:
      operationId: volumeBackups-list
      tags:
      - volumeBackups
      security:
      - Authorization: []
      parameters:
      - in: query
        name: id
        schema:
          type: string
          minLength: 1
        required: true
      - in: query
        name: volumeBackupType
        schema:
          type: string
          enum:
          - application
          - postgres
          - mysql
          - mariadb
          - mongo
          - redis
          - compose
          - libsql
        required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.UNAUTHORIZED'
        '403':
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.FORBIDDEN'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.NOT_FOUND'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.INTERNAL_SERVER_ERROR'
  /volumeBackups.create:
    post:
      operationId: volumeBackups-create
      tags:
      - volumeBackups
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                volumeName:
                  type: string
                prefix:
                  type: string
                serviceType:
                  type: string
                  enum:
                  - application
                  - postgres
                  - mysql
                  - mariadb
                  - mongo
                  - redis
                  - compose
                  - libsql
                appName:
                  type: string
                serviceName:
                  anyOf:
                  - type: string
                  - type: 'null'
                turnOff:
                  type: boolean
                cronExpression:
                  type: string
                keepLatestCount:
                  anyOf:
                  - type: number
                  - type: 'null'
                enabled:
                  anyOf:
                  - type: boolean
                  - type: 'null'
                applicationId:
                  anyOf:
                  - type: string
                  - type: 'null'
                postgresId:
                  anyOf:
                  - type: string
                  - type: 'null'
                mariadbId:
                  anyOf:
                  - type: string
                  - type: 'null'
                mongoId:
                  anyOf:
                  - type: string
                  - type: 'null'
                mysqlId:
                  anyOf:
                  - type: string
                  - type: 'null'
                redisId:
                  anyOf:
                  - type: string
                  - type: 'null'
                libsqlId:
                  anyOf:
                  - type: string
                  - type: 'null'
                composeId:
                  anyOf:
                  - type: string
                  - type: 'null'
                createdAt:
                  type: string
                destinationId:
                  type: string
              required:
              - name
              - volumeName
              - prefix
              - cronExpression
              - destinationId
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.UNAUTHORIZED'
        '403':
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.FORBIDDEN'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.INTERNAL_SERVER_ERROR'
  /volumeBackups.one:
    get:
      operationId: volumeBackups-one
      tags:
      - volumeBackups
      security:
      - Authorization: []
      parameters:
      - in: query
        name: volumeBackupId
        schema:
          type: string
          minLength: 1
        required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
