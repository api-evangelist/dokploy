  /volumeBackups.runManually:
    post:
      operationId: volumeBackups-runManually
      tags:
      - volumeBackups
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                volumeBackupId:
                  type: string
