                  - libsql
                appName:
                  type: string
                serviceName:
                  anyOf:
                  - type: string
                  - type: 'null'
                turnOff:
                  type: boolean
                cronExpression:
                  type: string
                keepLatestCount:
                  anyOf:
                  - type: number
                  - type: 'null'
                enabled:
                  anyOf:
                  - type: boolean
                  - type: 'null'
                applicationId:
                  anyOf:
                  - type: string
                  - type: 'null'
                postgresId:
                  anyOf:
                  - type: string
                  - type: 'null'
                mariadbId:
                  anyOf:
                  - type: string
                  - type: 'null'
                mongoId:
                  anyOf:
                  - type: string
                  - type: 'null'
                mysqlId:
                  anyOf:
                  - type: string
                  - type: 'null'
                redisId:
                  anyOf:
                  - type: string
                  - type: 'null'
                libsqlId:
                  anyOf:
                  - type: string
                  - type: 'null'
                composeId:
                  anyOf:
                  - type: string
                  - type: 'null'
                createdAt:
                  type: string
                destinationId:
                  type: string
                volumeBackupId:
                  type: string
                  minLength: 1
              required:
              - name
              - volumeName
              - prefix
              - cronExpression
              - destinationId
              - volumeBackupId
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
