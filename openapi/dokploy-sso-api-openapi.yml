                        privateKey:
                          type: string
                        privateKeyPass:
                          type: string
                        isAssertionEncrypted:
                          type: boolean
                        encPrivateKey:
                          type: string
                        encPrivateKeyPass:
                          type: string
                    wantAssertionsSigned:
                      type: boolean
                    authnRequestsSigned:
                      type: boolean
                    signatureAlgorithm:
                      type: string
                    digestAlgorithm:
                      type: string
                    identifierFormat:
                      type: string
                    privateKey:
                      type: string
                    decryptionPvk:
                      type: string
                    additionalParams:
                      type: object
                      propertyNames:
                        type: string
                      additionalProperties: {}
                    mapping:
                      type: object
                      properties:
                        id:
                          type: string
                        email:
                          type: string
                        emailVerified:
                          type: string
                        name:
                          type: string
                        firstName:
                          type: string
                        lastName:
                          type: string
                        extraFields:
                          type: object
                          propertyNames:
                            type: string
                          additionalProperties: {}
                      required:
                      - id
                      - email
                      - name
                  required:
                  - entryPoint
                  - cert
                  - callbackUrl
                  - spMetadata
                organizationId:
                  type: string
                overrideUserInfo:
