  /sso.update:
    post:
      operationId: sso-update
      tags:
      - sso
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                providerId:
                  type: string
                issuer:
                  type: string
                domains:
                  type: array
                  items:
                    type: string
                oidcConfig:
                  type: object
                  properties:
                    clientId:
                      type: string
                    clientSecret:
                      type: string
                    authorizationEndpoint:
                      type: string
                    tokenEndpoint:
                      type: string
                    userInfoEndpoint:
                      type: string
                    tokenEndpointAuthentication:
                      type: string
                      enum:
                      - client_secret_post
                      - client_secret_basic
                    jwksEndpoint:
                      type: string
                    discoveryEndpoint:
                      type: string
                    skipDiscovery:
                      type: boolean
                    scopes:
                      type: array
                      items:
                        type: string
                    pkce:
                      default: true
                      type: boolean
                    mapping:
                      type: object
                      properties:
                        id:
                          type: string
                        email:
                          type: string
                        emailVerified:
                          type: string
                        name:
                          type: string
                        image:
                          type: string
                        extraFields:
                          type: object
                          propertyNames:
                            type: string
                          additionalProperties: {}
                      required:
                      - id
                      - email
                      - name
                  required:
                  - clientId
                  - clientSecret
                samlConfig:
                  type: object
                  properties:
                    entryPoint:
                      type: string
                    cert:
                      type: string
                    callbackUrl:
                      type: string
                    audience:
                      type: string
                    idpMetadata:
                      type: object
                      properties:
                        metadata:
                          type: string
                        entityID:
                          type: string
                        cert:
                          type: string
                        privateKey:
                          type: string
                        privateKeyPass:
                          type: string
                        isAssertionEncrypted:
                          type: boolean
                        encPrivateKey:
                          type: string
                        encPrivateKeyPass:
                          type: string
                        singleSignOnService:
                          type: array
                          items:
                            type: object
                            properties:
                              Binding:
                                type: string
                              Location:
                                type: string
                            required:
                            - Binding
                            - Location
                    spMetadata:
                      type: object
                      properties:
                        metadata:
                          type: string
                        entityID:
                          type: string
                        binding:
                          type: string
                        privateKey:
                          type: string
                        privateKeyPass:
                          type: string
                        isAssertionEncrypted:
                          type: boolean
                        encPrivateKey:
                          type: string
                        encPrivateKeyPass:
                          type: string
                    wantAssertionsSigned:
                      type: boolean
                    authnRequestsSigned:
                      type: boolean
                    signatureAlgorithm:
                      type: string
                    digestAlgorithm:
                      type: string
                    identifierFormat:
                      type: string
                    privateKey:
                      type: string
                    decryptionPvk:
                      type: string
                    additionalParams:
                      type: object
                      propertyNames:
                        type: string
                      additionalProperties: {}
                    mapping:
                      type: object
                      properties:
                        id:
                          type: string
                        email:
                          type: string
                        emailVerified:
                          type: string
                        name:
                          type: string
                        firstName:
                          type: string
                        lastName:
                          type: string
                        extraFields:
                          type: object
                          propertyNames:
                            type: string
                          additionalProperties: {}
                      required:
                      - id
                      - email
                      - name
                  required:
                  - entryPoint
                  - cert
                  - callbackUrl
                  - spMetadata
                organizationId:
                  type: string
                overrideUserInfo:
                  default: false
                  type: boolean
              required:
              - providerId
              - issuer
              - domains
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
