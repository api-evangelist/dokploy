openapi: 3.1.0
info:
  title: Dokploy admin domain API
  description: Complete API documentation for Dokploy - Deploy applications, manage databases, and orchestrate your infrastructure. This API allows you to programmatically manage all aspects of your Dokploy instance.
  version: 1.0.0
  contact:
    name: Dokploy Team
    url: https://dokploy.com
  license:
    name: Apache 2.0
    url: https://github.com/dokploy/dokploy/blob/canary/LICENSE
servers:
- url: https://your-dokploy-instance.com/api
security:
- apiKey: []
tags:
- name: domain
paths:
  /domain.create:
    post:
      operationId: domain-create
      tags:
      - domain
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                host:
                  type: string
                  minLength: 1
                path:
                  anyOf:
                  - type: string
                    minLength: 1
                  - type: 'null'
                port:
                  anyOf:
                  - type: number
                    minimum: 1
                    maximum: 65535
                  - type: 'null'
                customEntrypoint:
                  anyOf:
                  - type: string
                  - type: 'null'
                https:
                  type: boolean
                applicationId:
                  anyOf:
                  - type: string
                  - type: 'null'
                certificateType:
                  type: string
                  enum:
                  - letsencrypt
                  - none
                  - custom
                customCertResolver:
                  anyOf:
                  - type: string
                  - type: 'null'
                composeId:
                  anyOf:
                  - type: string
                  - type: 'null'
                serviceName:
                  anyOf:
                  - type: string
                  - type: 'null'
                domainType:
                  anyOf:
                  - type: string
                    enum:
                    - compose
                    - application
                    - preview
                  - type: 'null'
                previewDeploymentId:
                  anyOf:
                  - type: string
                  - type: 'null'
                internalPath:
                  anyOf:
                  - type: string
                  - type: 'null'
                stripPath:
                  type: boolean
                middlewares:
                  anyOf:
                  - type: array
                    items:
                      type: string
                  - type: 'null'
              required:
              - host
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.UNAUTHORIZED'
        '403':
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.FORBIDDEN'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.INTERNAL_SERVER_ERROR'
  /domain.byApplicationId:
