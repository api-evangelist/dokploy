                owner:
                  anyOf:
                  - type: string
                  - type: 'null'
                branch:
                  anyOf:
                  - type: string
                  - type: 'null'
                autoDeploy:
                  anyOf:
                  - type: boolean
                  - type: 'null'
                gitlabProjectId:
                  anyOf:
                  - type: number
                  - type: 'null'
                gitlabRepository:
                  anyOf:
                  - type: string
                  - type: 'null'
                gitlabOwner:
                  anyOf:
                  - type: string
                  - type: 'null'
                gitlabBranch:
                  anyOf:
                  - type: string
                  - type: 'null'
                gitlabPathNamespace:
                  anyOf:
                  - type: string
                  - type: 'null'
                bitbucketRepository:
                  anyOf:
                  - type: string
                  - type: 'null'
                bitbucketRepositorySlug:
                  anyOf:
                  - type: string
                  - type: 'null'
                bitbucketOwner:
                  anyOf:
                  - type: string
                  - type: 'null'
                bitbucketBranch:
                  anyOf:
                  - type: string
                  - type: 'null'
                giteaRepository:
                  anyOf:
                  - type: string
                  - type: 'null'
                giteaOwner:
                  anyOf:
                  - type: string
                  - type: 'null'
                giteaBranch:
                  anyOf:
                  - type: string
                  - type: 'null'
                customGitUrl:
                  anyOf:
                  - type: string
                  - type: 'null'
                customGitBranch:
                  anyOf:
                  - type: string
                  - type: 'null'
                customGitSSHKeyId:
                  anyOf:
                  - type: string
                  - type: 'null'
                command:
                  type: string
                enableSubmodules:
                  type: boolean
                composePath:
                  type: string
                  minLength: 1
                suffix:
                  type: string
                randomize:
                  type: boolean
                isolatedDeployment:
                  type: boolean
                isolatedDeploymentsVolume:
                  type: boolean
                triggerType:
