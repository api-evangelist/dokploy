                  - type: string
                    enum:
                    - push
                    - tag
                  - type: 'null'
                composeStatus:
                  type: string
                  enum:
                  - idle
                  - running
                  - done
                  - error
                environmentId:
                  type: string
                createdAt:
                  type: string
                watchPaths:
                  anyOf:
                  - type: array
                    items:
                      type: string
                  - type: 'null'
                githubId:
                  anyOf:
                  - type: string
                  - type: 'null'
                gitlabId:
                  anyOf:
                  - type: string
                  - type: 'null'
                bitbucketId:
                  anyOf:
                  - type: string
                  - type: 'null'
                giteaId:
                  anyOf:
                  - type: string
                  - type: 'null'
              required:
              - composeId
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
