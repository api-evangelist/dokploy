      operationId: server-create
      tags:
      - server
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                description:
                  anyOf:
                  - type: string
                  - type: 'null'
                ipAddress:
                  type: string
                port:
                  type: number
                username:
                  type: string
                sshKeyId:
                  anyOf:
                  - type: string
                  - type: 'null'
                serverType:
                  type: string
                  enum:
                  - deploy
                  - build
              required:
              - name
              - description
              - ipAddress
              - port
              - username
              - sshKeyId
              - serverType
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: false
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.BAD_REQUEST'
        '401':
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.UNAUTHORIZED'
        '403':
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.FORBIDDEN'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error.INTERNAL_SERVER_ERROR'
