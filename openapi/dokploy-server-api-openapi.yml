      operationId: server-setupMonitoring
      tags:
      - server
      security:
      - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serverId:
                  type: string
                  minLength: 1
                metricsConfig:
                  type: object
                  properties:
                    server:
                      type: object
                      properties:
                        refreshRate:
                          type: number
                          minimum: 2
                        port:
                          type: number
                          minimum: 1
                        token:
                          type: string
                        urlCallback:
                          type: string
                          format: uri
                        retentionDays:
                          type: number
                          minimum: 1
                        cronJob:
                          type: string
                          minLength: 1
                        thresholds:
                          type: object
                          properties:
                            cpu:
                              type: number
                              minimum: 0
                            memory:
                              type: number
                              minimum: 0
                          required:
                          - cpu
                          - memory
                      required:
                      - refreshRate
                      - port
                      - token
                      - urlCallback
                      - retentionDays
                      - cronJob
                      - thresholds
                    containers:
                      type: object
                      properties:
                        refreshRate:
                          type: number
                          minimum: 2
                        services:
                          type: object
                          properties:
                            include:
                              type: array
                              items:
                                type: string
                            exclude:
                              type: array
                              items:
                                type: string
                      required:
                      - refreshRate
                      - services
                  required:
                  - server
                  - containers
              required:
              - serverId
              - metricsConfig
